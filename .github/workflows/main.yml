name: Deploy Express Backend to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GH_PAT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: GITHUB_PAT

          script: |
            set -e

            echo "========================================"
            echo " Deploy Escolat TUR API"
            echo "========================================"

            PROJECT_PATH="/var/www/ds2/escolat-tur-api"

            # Clonar por primera vez
            if [ ! -d "$PROJECT_PATH/.git" ]; then
              mkdir -p $PROJECT_PATH

              git clone \
              https://stev0r1v4s:$GITHUB_PAT@github.com/stev0r1v4s/EscolaTour-Backend.git \
              $PROJECT_PATH
            fi

            cd $PROJECT_PATH

            # Actualizar repositorio
            git remote set-url origin \
            https://stev0r1v4s:$GITHUB_PAT@github.com/stev0r1v4s/EscolaTour-Backend.git

            git fetch origin
            git reset --hard origin/main

            # Dependencias
            npm install

            # Archivo .env
            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            # Corregir permisos de Prisma
            chmod +x node_modules/.bin/prisma || true

            # Prisma
            npx prisma generate
            npx prisma migrate deploy

            # Prisma
            npx prisma generate

            npx prisma migrate deploy

            # Build (si existe)
            npm run build || true

            # Reiniciar aplicación
            pm2 restart escolat-tur-api || \
            pm2 start npm --name escolat-tur-api -- start

            pm2 save

            echo "========================================"
            echo " Deploy completado"
            echo "========================================"
